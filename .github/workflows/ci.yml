name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile wiki checker
        run: python3 -m py_compile core/scripts/check_wiki.py

      - name: Check demo vault
        run: python3 core/scripts/check_wiki.py examples/demo-vault

      - name: Check vendored copies
        run: python3 scripts/check_sync.py
